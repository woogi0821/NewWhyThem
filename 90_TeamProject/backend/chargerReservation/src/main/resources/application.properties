# 1. \uD504\uB85C\uC81D\uD2B8 \uC774\uB984 (\uAD50\uC7AC \uC774\uB984\uC5D0\uC11C \uC6B0\uB9AC \uD504\uB85C\uC81D\uD2B8\uBA85\uC73C\uB85C \uBCC0\uACBD)
spring.application.name=chargerReservation

# UTF-8 : \uD55C\uAE00 \uC124\uC815: shift \uD0A4 2\uBC88 -> \uB3CB\uBCF4\uAE30: \uC778\uCF54\uB529 -> \uD504\uB85C\uD37C\uD2F0~\uC778\uCF54\uB529 \uD074\uB9AD -> UTF-8 \uC120\uD0DD, \uCCB4\uD06C -> \uD655\uC778 \uBC84\uD2BC \uD074\uB9AD

# 2. Oracle DB Setting
spring.datasource.driver-class-name=oracle.jdbc.driver.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@192.168.30.34:1521:xe
spring.datasource.username=NewWhyThem
spring.datasource.password=1234

# 3. JPA Setting (\uADF8\uB300\uB85C \uC720\uC9C0)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# 4. File Upload Setting (\uADF8\uB300\uB85C \uC720\uC9C0)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
image.upload-dir=c:/Work/upload/

# 5. Error Messages Setting (\uADF8\uB300\uB85C \uC720\uC9C0)
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# 6. React IP Setting (\uD504\uB860\uD2B8\uC5D4\uB4DC \uD3EC\uD2B8 5173 \uADF8\uB300\uB85C \uC720\uC9C0)
spring.react.ip=http://localhost:5173

# 7. Redis Setting (\uB9AC\uD504\uB808\uC2DC \uD1A0\uD070 & \uD604\uC7A5 \uD540\uBC88\uD638 \uC800\uC7A5\uC6A9)
spring.data.redis.host=192.168.30.43
spring.data.redis.port=6379

# 8. JWT Token Setting (\uB85C\uADF8\uC778 \uBCF4\uC548\uC6A9)
# \uC8FC\uC758: secret-key\uB294 \uBB34\uC870\uAC74 32\uBC14\uC774\uD2B8(\uAE00\uC790) \uC774\uC0C1\uC774\uC5B4\uC57C \uC791\uB3D9\uD569\uB2C8\uB2E4. (\uC544\uB798\uB294 \uC608\uC2DC)
jwt.secret-key=TeamprojectElectricVehicleReservationSystemSecretKey2026
# Access Token \uB9CC\uB8CC \uC2DC\uAC04 (\uC608: 30\uBD84 = 1800000 \uBC00\uB9AC\uCD08)
jwt.access-token-validity-in-milliseconds=1800000
# Refresh Token \uB9CC\uB8CC \uC2DC\uAC04 (\uC608: 7\uC77C = 604800000 \uBC00\uB9AC\uCD08)
jwt.refresh-token-validity-in-milliseconds=604800000

# OAuth2 카카오 설정
spring.security.oauth2.client.registration.kakao.client-id=발급받은_REST_API_키
spring.security.oauth2.client.registration.kakao.client-secret=발급받은_Client_Secret
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.scope=profile_nickname, account_email
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# OAuth2 네이버 설정 (공급자 정보 직접 입력 필수)
spring.security.oauth2.client.registration.naver.client-id=발급받은_Client_ID
spring.security.oauth2.client.registration.naver.client-secret=발급받은_Client_Secret
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.redirect-uri={baseUrl}/login/oauth2/code/naver
spring.security.oauth2.client.registration.naver.scope=name, email
spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response